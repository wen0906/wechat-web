<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - 预览</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 预览页面专用样式 */
        .preview-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--card-bg);
            border-radius: var(--radius);
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }
        
        .preview-title {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-color);
        }
        
        .preview-actions {
            display: flex;
            gap: 10px;
        }
        
        .preview-frame {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            min-height: 500px;
        }
        
        .preview-toolbar {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: var(--radius);
            margin-top: 20px;
            box-shadow: var(--shadow);
        }
        
        .btn-publish {
            background: linear-gradient(135deg, #07c160 0%, #06ad56 100%);
            color: white;
            border: none;
        }
        
        .btn-publish:hover {
            background: linear-gradient(135deg, #06ad56 0%, #05924d 100%);
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .preview-header {
                flex-direction: column;
                gap: 15px;
            }
            
            .preview-toolbar {
                flex-direction: column;
            }
            
            .preview-toolbar .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="preview-container">
        <div class="preview-header">
            <span class="preview-title">📖 文章预览</span>
            <div class="preview-actions">
                <button class="btn btn-secondary" onclick="toggleTheme()">
                    <span id="theme-icon">🌙</span> 切换主题
                </button>
                <button class="btn btn-secondary" onclick="window.close()">
                    ← 返回编辑
                </button>
            </div>
        </div>
        
        <div class="preview-frame">
            <div id="preview-content" style="display: none;">
                {{ html|safe }}
            </div>
            <div id="preview-loading" style="padding: 100px; text-align: center; color: var(--text-secondary);">
                加载中...
            </div>
        </div>
        
        <div class="preview-toolbar">
            <button class="btn btn-secondary" onclick="copyHtml()">
                <span>📋</span> 复制 HTML
            </button>
            <button class="btn btn-secondary" onclick="window.print()">
                <span>🖨️</span> 打印
            </button>
            <button class="btn btn-publish" onclick="publishArticle()">
                <span>🚀</span> 发布到公众号
            </button>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <script>
        // 存储当前 HTML 内容
        const currentHtml = {{ html|tojson }};
        const articleTitle = {{ title|tojson }};
        
        // 页面加载完成后显示内容
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('preview-loading').style.display = 'none';
            document.getElementById('preview-content').style.display = 'block';
        });
        
        // 切换主题
        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('theme-icon');
            
            if (body.classList.contains('dark-theme')) {
                body.classList.remove('dark-theme');
                themeIcon.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.add('dark-theme');
                themeIcon.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            }
        }
        
        // 复制 HTML
        function copyHtml() {
            navigator.clipboard.writeText(currentHtml).then(() => {
                showToast('✅ HTML 已复制到剪贴板');
            }).catch(err => {
                showToast('❌ 复制失败，请手动复制');
            });
        }
        
        // 发布文章
        async function publishArticle() {
            if (!confirm('确定要发布到公众号吗？\n\n文章将保存到公众号草稿箱。')) {
                return;
            }
            
            showToast('📤 正在发布...');
            
            try {
                const response = await fetch('/api/publish', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        html: currentHtml,
                        title: articleTitle
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast('✅ 发布成功！请前往公众号后台查看草稿');
                    setTimeout(() => {
                        alert('🎉 发布成功！\n\n文章已保存到微信公众号草稿箱。\n请登录 mp.weixin.qq.com 进行最终编辑和发布。');
                    }, 500);
                } else {
                    showToast('❌ ' + result.message);
                }
            } catch (error) {
                showToast('❌ 发布失败：' + error.message);
            }
        }
        
        // Toast 提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }
        
        // 初始化主题
        const savedTheme = localStorage.getItem('theme');
        const themeIcon = document.getElementById('theme-icon');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-theme');
            themeIcon.textContent = '☀️';
        }
    </script>
</body>
</html>
